name: Build Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK (auto-bump version)
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Commit version bump + archived APK
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.properties apk/
          git commit -m "chore: release v$(grep '^versionName=' version.properties | cut -d= -f2) [skip ci]" || true
          git push

      - name: Create GitHub Release with APK asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION_NAME=$(grep '^versionName=' version.properties | cut -d= -f2)
          APK=$(ls apk/pockethub-${VERSION_NAME}.apk 2>/dev/null | head -1)
          [ -z "$APK" ] && { echo "No APK found, skipping release"; exit 0; }
          # Replace existing release/tag if re-running on the same version.
          gh release delete "v${VERSION_NAME}" --yes --cleanup-tag 2>/dev/null || true
          gh release create "v${VERSION_NAME}" "$APK" \
            --title "PocketHub v${VERSION_NAME}" \
            --notes "Auto-built release APK for PocketHub v${VERSION_NAME}."

          # Prune old releases/tags, keep only the newest 2.
          # `gh release list` output columns: Title / Type / Tag / Published
          # Sort by Published ascending so the oldest are at the top.
          mapfile -t ALL_TAGS < <(gh release list --json tagName --jq '.[].tagName' | sort -V -r)
          TOTAL=${#ALL_TAGS[@]}
          echo "Found $TOTAL releases, keeping newest 2"
          if [ "$TOTAL" -gt 2 ]; then
            for tag in "${ALL_TAGS[@]:2}"; do
              echo "Pruning old release+tag: $tag"
              gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
            done
          fi
